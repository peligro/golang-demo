basePath: /
definitions:
  common.PaginatedResponse-dto_AppMenuResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.AppMenuResponse'
        type: array
      pagination:
        $ref: '#/definitions/common.PaginationInfo'
    type: object
  common.PaginatedResponse-dto_HomeMenuResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.HomeMenuResponse'
        type: array
      pagination:
        $ref: '#/definitions/common.PaginationInfo'
    type: object
  common.PaginatedResponse-dto_ModuleResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ModuleResponse'
        type: array
      pagination:
        $ref: '#/definitions/common.PaginationInfo'
    type: object
  common.PaginatedResponse-dto_ProfileResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ProfileResponse'
        type: array
      pagination:
        $ref: '#/definitions/common.PaginationInfo'
    type: object
  common.PaginatedResponse-dto_UserResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
      pagination:
        $ref: '#/definitions/common.PaginationInfo'
    type: object
  common.PaginationInfo:
    properties:
      current_page:
        type: integer
      last_page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
    type: object
  dto.AppMenuCreateRequest:
    properties:
      icon:
        example: fa-home
        maxLength: 200
        type: string
      label:
        example: Inicio
        maxLength: 200
        type: string
      module_id:
        example: 1
        type: integer
      order:
        example: 1
        type: integer
      parent_id:
        example: 0
        type: integer
      title:
        example: Página principal
        maxLength: 200
        type: string
    required:
    - label
    - title
    type: object
  dto.AppMenuResponse:
    properties:
      created_at:
        type: string
      icon:
        type: string
      id:
        type: integer
      label:
        type: string
      module_id:
        type: integer
      order:
        type: integer
      parent_id:
        type: integer
      title:
        type: string
      updated_at:
        type: string
    type: object
  dto.AppMenuUpdateRequest:
    properties:
      icon:
        example: fa-home
        maxLength: 200
        type: string
      label:
        example: Inicio
        maxLength: 200
        type: string
      module_id:
        example: 1
        type: integer
      order:
        example: 1
        type: integer
      parent_id:
        example: 0
        type: integer
      title:
        example: Página principal
        maxLength: 200
        type: string
    type: object
  dto.HealthResponse:
    properties:
      status:
        example: UP!!
        type: string
    type: object
  dto.HomeMenuCreateRequest:
    properties:
      color:
        example: '#3b82f6'
        maxLength: 100
        type: string
      description:
        example: Panel principal de control
        type: string
      icon:
        example: fa-chart-line
        maxLength: 100
        type: string
      module_id:
        example: 1
        type: integer
      order:
        example: 1
        type: integer
      slug:
        example: /dashboard
        maxLength: 200
        type: string
      title:
        example: Dashboard
        maxLength: 200
        type: string
    required:
    - color
    - description
    - icon
    - slug
    - title
    type: object
  dto.HomeMenuResponse:
    properties:
      color:
        type: string
      created_at:
        type: string
      description:
        type: string
      icon:
        type: string
      id:
        type: integer
      module_id:
        type: integer
      order:
        type: integer
      slug:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  dto.HomeMenuUpdateRequest:
    properties:
      color:
        example: '#3b82f6'
        maxLength: 100
        type: string
      description:
        example: Panel principal de control
        type: string
      icon:
        example: fa-chart-line
        maxLength: 100
        type: string
      module_id:
        example: 1
        type: integer
      order:
        example: 1
        type: integer
      slug:
        example: /dashboard
        maxLength: 200
        type: string
      title:
        example: Dashboard
        maxLength: 200
        type: string
    type: object
  dto.ItemCreateRequest:
    properties:
      code:
        example: crear_usuario
        maxLength: 50
        minLength: 3
        type: string
      name:
        example: Crear Usuario
        maxLength: 50
        minLength: 3
        type: string
    required:
    - code
    - name
    type: object
  dto.ItemResponse:
    properties:
      code:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  dto.ItemUpdateRequest:
    properties:
      code:
        example: actualizar_usuario
        maxLength: 50
        minLength: 3
        type: string
      name:
        example: Actualizar Usuario
        maxLength: 50
        minLength: 3
        type: string
    required:
    - code
    - name
    type: object
  dto.LoginRequest:
    properties:
      email:
        example: cesar@tudominio.com
        type: string
      password:
        description: ← Placeholder genérico
        example: '********'
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.LogoutResponse:
    properties:
      message:
        type: string
    type: object
  dto.MeResponse:
    properties:
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.ModuleCreateRequest:
    properties:
      name:
        example: Usuarios
        maxLength: 100
        minLength: 3
        type: string
      slug:
        example: /setting/users
        maxLength: 100
        type: string
    required:
    - name
    - slug
    type: object
  dto.ModuleResponse:
    properties:
      id:
        type: integer
      name:
        type: string
      slug:
        type: string
    type: object
  dto.ModuleUpdateRequest:
    properties:
      name:
        example: Usuarios
        maxLength: 100
        minLength: 3
        type: string
      slug:
        example: /setting/users
        maxLength: 100
        type: string
    required:
    - name
    - slug
    type: object
  dto.ProfileCreateRequest:
    properties:
      description:
        example: Acceso completo a todos los módulos del sistema
        maxLength: 500
        minLength: 10
        type: string
      name:
        example: Administrador
        maxLength: 100
        minLength: 3
        type: string
    required:
    - description
    - name
    type: object
  dto.ProfileModuleItemAttachRequest:
    properties:
      item_id:
        example: 1
        type: integer
    required:
    - item_id
    type: object
  dto.ProfileModuleItemSyncRequest:
    properties:
      items:
        items:
          type: integer
        type: array
    type: object
  dto.ProfileModuleSyncRequest:
    properties:
      modules:
        items:
          type: integer
        type: array
    type: object
  dto.ProfileResponse:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  dto.ProfileSummary:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  dto.ProfileUpdateRequest:
    properties:
      description:
        example: Acceso completo a todos los módulos del sistema
        maxLength: 500
        minLength: 10
        type: string
      name:
        example: Administrador
        maxLength: 100
        minLength: 3
        type: string
    required:
    - description
    - name
    type: object
  dto.RefreshResponse:
    properties:
      message:
        type: string
    type: object
  dto.StateCreateRequest:
    properties:
      name:
        example: Activo
        maxLength: 100
        minLength: 3
        type: string
    required:
    - name
    type: object
  dto.StateResponse:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  dto.StateUpdateRequest:
    properties:
      name:
        example: Activo
        maxLength: 100
        minLength: 3
        type: string
    required:
    - name
    type: object
  dto.UserCreateRequest:
    properties:
      email:
        example: cesar@tudominio.com
        maxLength: 255
        type: string
      name:
        example: César Pérez
        maxLength: 255
        minLength: 2
        type: string
      password:
        example: '********'
        maxLength: 100
        minLength: 8
        type: string
      phone:
        description: Metadata (opcional)
        example: "+56912345678"
        maxLength: 20
        type: string
      profile_id:
        example: 1
        type: integer
      state:
        enum:
        - 0
        - 1
        example: 1
        type: integer
    required:
    - email
    - name
    - password
    type: object
  dto.UserModuleResponse:
    properties:
      items:
        description: ← Items con code incluido
        items:
          $ref: '#/definitions/dto.ItemResponse'
        type: array
      name:
        type: string
      slug:
        type: string
    type: object
  dto.UserResponse:
    properties:
      date:
        type: string
      email:
        type: string
      id:
        type: integer
      modules:
        description: ← Usa el tipo específico
        items:
          $ref: '#/definitions/dto.UserModuleResponse'
        type: array
      name:
        type: string
      phone:
        type: string
      profile:
        $ref: '#/definitions/dto.ProfileSummary'
      profile_id:
        type: integer
      state:
        type: integer
      time:
        type: string
    type: object
  dto.UserUpdateRequest:
    properties:
      email:
        example: cesar@tudominio.com
        maxLength: 255
        type: string
      name:
        example: César Pérez
        maxLength: 255
        minLength: 2
        type: string
      password:
        example: '********'
        maxLength: 100
        minLength: 8
        type: string
      phone:
        example: "+56912345678"
        maxLength: 20
        type: string
      profile_id:
        example: 1
        type: integer
      state:
        enum:
        - 0
        - 1
        example: 1
        type: integer
    type: object
host: localhost:8082
info:
  contact: {}
  description: API Backend para GOLANG DEMO.
  title: Golang DEMO
  version: "1.0"
paths:
  /app-menu:
    get:
      description: Retorna menús paginados para el panel de administración
      parameters:
      - default: 1
        description: Página
        in: query
        name: page
        type: integer
      - default: 20
        description: Registros por página
        in: query
        name: per_page
        type: integer
      - description: Término de búsqueda
        in: query
        name: search
        type: string
      - description: Campo a buscar
        enum:
        - label
        - title
        in: query
        name: field
        type: string
      - description: Campo para ordenar
        enum:
        - id
        - label
        - title
        - order
        - created_at
        in: query
        name: sort_by
        type: string
      - description: Dirección
        enum:
        - asc
        - desc
        in: query
        name: sort_dir
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.PaginatedResponse-dto_AppMenuResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Listar menús con paginación
      tags:
      - App Menu
    post:
      consumes:
      - application/json
      description: Crea un menú con validación de padre y módulo
      parameters:
      - description: Datos del menú
        in: body
        name: menu
        required: true
        schema:
          $ref: '#/definitions/dto.AppMenuCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.AppMenuResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Crear nuevo menú
      tags:
      - App Menu
  /app-menu-all:
    get:
      description: Retorna la lista completa de menús ordenada, ideal para el sidebar
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.AppMenuResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Listar todos los menús (sin paginación)
      tags:
      - App Menu
  /app-menu/{id}:
    delete:
      description: Elimina un menú si no tiene hijos
      parameters:
      - description: ID del menú
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Eliminar menú
      tags:
      - App Menu
    get:
      description: Retorna un menú específico
      parameters:
      - description: ID del menú
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AppMenuResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Obtener menú por ID
      tags:
      - App Menu
    put:
      consumes:
      - application/json
      description: Actualiza un menú existente
      parameters:
      - description: ID del menú
        in: path
        name: id
        required: true
        type: integer
      - description: Nuevos datos
        in: body
        name: menu
        required: true
        schema:
          $ref: '#/definitions/dto.AppMenuUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AppMenuResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Actualizar menú
      tags:
      - App Menu
  /auth/login:
    post:
      consumes:
      - application/json
      description: Autentica al usuario y crea una sesión con cookie HTTP-only
      parameters:
      - description: Credenciales
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Iniciar sesión
      tags:
      - Auth
  /auth/logout:
    post:
      description: Invalida la sesión actual y elimina la cookie
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LogoutResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Cerrar sesión
      tags:
      - Auth
  /auth/me:
    get:
      description: Retorna los datos del usuario actualmente autenticado, incluyendo
        su perfil, estado y módulos con permisos (items) asignados
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MeResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Obtener usuario autenticado
      tags:
      - Auth
  /auth/refresh:
    post:
      description: Extiende el TTL de la sesión actual
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RefreshResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Renovar sesión
      tags:
      - Auth
  /health:
    get:
      description: Retorna "UP!!" si el servicio está activo
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.HealthResponse'
      summary: Verifica estado del servidor
      tags:
      - Health
  /home-menu:
    get:
      description: Retorna menús del home paginados para el panel de administración
      parameters:
      - default: 1
        description: Página
        in: query
        name: page
        type: integer
      - default: 20
        description: Registros por página
        in: query
        name: per_page
        type: integer
      - description: Término de búsqueda
        in: query
        name: search
        type: string
      - description: Campo a buscar
        enum:
        - title
        - description
        - slug
        in: query
        name: field
        type: string
      - description: Campo para ordenar
        enum:
        - id
        - title
        - order
        - created_at
        in: query
        name: sort_by
        type: string
      - description: Dirección
        enum:
        - asc
        - desc
        in: query
        name: sort_dir
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.PaginatedResponse-dto_HomeMenuResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Listar menús del home con paginación
      tags:
      - Home Menu
    post:
      consumes:
      - application/json
      description: Crea un menú del home con validación de módulo
      parameters:
      - description: Datos del menú del home
        in: body
        name: menu
        required: true
        schema:
          $ref: '#/definitions/dto.HomeMenuCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.HomeMenuResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Crear nuevo menú del home
      tags:
      - Home Menu
  /home-menu-all:
    get:
      description: Retorna la lista completa de menús del home ordenada, ideal para
        mostrar en el dashboard
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.HomeMenuResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Listar todos los menús del home (sin paginación)
      tags:
      - Home Menu
  /home-menu/{id}:
    delete:
      description: Elimina un menú del home
      parameters:
      - description: ID del menú del home
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Eliminar menú del home
      tags:
      - Home Menu
    get:
      description: Retorna un menú del home específico
      parameters:
      - description: ID del menú del home
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.HomeMenuResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Obtener menú del home por ID
      tags:
      - Home Menu
    put:
      consumes:
      - application/json
      description: Actualiza un menú del home existente
      parameters:
      - description: ID del menú del home
        in: path
        name: id
        required: true
        type: integer
      - description: Nuevos datos
        in: body
        name: menu
        required: true
        schema:
          $ref: '#/definitions/dto.HomeMenuUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.HomeMenuResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Actualizar menú del home
      tags:
      - Home Menu
  /items:
    get:
      description: Retorna todos los items registrados ordenados por ID descendente
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ItemResponse'
            type: array
      summary: Listar items
      tags:
      - Items
    post:
      consumes:
      - application/json
      description: Crea un nuevo item (acción) con nombre y código únicos
      parameters:
      - description: Datos del item
        in: body
        name: item
        required: true
        schema:
          $ref: '#/definitions/dto.ItemCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ItemResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Crear nuevo item
      tags:
      - Items
  /items/{id}:
    delete:
      description: Elimina un item por su ID (valida dependencias con profile_module_item)
      parameters:
      - description: ID del item
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Eliminar item
