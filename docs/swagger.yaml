basePath: /
definitions:
  common.PaginatedResponse-dto_ModuleResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ModuleResponse'
        type: array
      pagination:
        $ref: '#/definitions/common.PaginationInfo'
    type: object
  common.PaginatedResponse-dto_ProfileResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ProfileResponse'
        type: array
      pagination:
        $ref: '#/definitions/common.PaginationInfo'
    type: object
  common.PaginatedResponse-dto_UserResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
      pagination:
        $ref: '#/definitions/common.PaginationInfo'
    type: object
  common.PaginationInfo:
    properties:
      current_page:
        type: integer
      last_page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
    type: object
  dto.HealthResponse:
    properties:
      status:
        example: UP!!
        type: string
    type: object
  dto.ItemCreateRequest:
    properties:
      name:
        description: |-
          ✅ Validación simple: required + longitud
          Si necesitas formato slug estricto, valida manualmente en el handler
        example: crear_usuario
        maxLength: 50
        minLength: 3
        type: string
    required:
    - name
    type: object
  dto.ItemResponse:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  dto.ItemUpdateRequest:
    properties:
      name:
        example: actualizar_usuario
        maxLength: 50
        minLength: 3
        type: string
    required:
    - name
    type: object
  dto.LoginRequest:
    properties:
      email:
        example: cesar@tudominio.com
        type: string
      password:
        description: ← Placeholder genérico
        example: '********'
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.LogoutResponse:
    properties:
      message:
        type: string
    type: object
  dto.MeResponse:
    properties:
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.ModuleCreateRequest:
    properties:
      name:
        example: Usuarios
        maxLength: 100
        minLength: 3
        type: string
      slug:
        example: /setting/users
        maxLength: 100
        type: string
    required:
    - name
    - slug
    type: object
  dto.ModuleResponse:
    properties:
      id:
        type: integer
      name:
        type: string
      slug:
        type: string
    type: object
  dto.ModuleUpdateRequest:
    properties:
      name:
        example: Usuarios
        maxLength: 100
        minLength: 3
        type: string
      slug:
        example: /setting/users
        maxLength: 100
        type: string
    required:
    - name
    - slug
    type: object
  dto.ProfileCreateRequest:
    properties:
      description:
        example: Acceso completo a todos los módulos del sistema
        maxLength: 500
        minLength: 10
        type: string
      name:
        example: Administrador
        maxLength: 100
        minLength: 3
        type: string
    required:
    - description
    - name
    type: object
  dto.ProfileModuleItemAttachRequest:
    properties:
      item_id:
        example: 1
        type: integer
    required:
    - item_id
    type: object
  dto.ProfileModuleItemSyncRequest:
    properties:
      items:
        items:
          type: integer
        type: array
    type: object
  dto.ProfileModuleSyncRequest:
    properties:
      modules:
        items:
          type: integer
        type: array
    type: object
  dto.ProfileResponse:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  dto.ProfileSummary:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  dto.ProfileUpdateRequest:
    properties:
      description:
        example: Acceso completo a todos los módulos del sistema
        maxLength: 500
        minLength: 10
        type: string
      name:
        example: Administrador
        maxLength: 100
        minLength: 3
        type: string
    required:
    - description
    - name
    type: object
  dto.RefreshResponse:
    properties:
      message:
        type: string
    type: object
  dto.StateResponse:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  dto.UserCreateRequest:
    properties:
      email:
        example: cesar@tudominio.com
        maxLength: 255
        type: string
      name:
        example: César Pérez
        maxLength: 255
        minLength: 2
        type: string
      password:
        example: '********'
        maxLength: 100
        minLength: 8
        type: string
      phone:
        description: Metadata (opcional)
        example: "+56912345678"
        maxLength: 20
        type: string
      profile_id:
        example: 1
        type: integer
      state:
        description: ← *int para distinguir "no enviado" de "0"
        enum:
        - 0
        - 1
        example: 1
        type: integer
    required:
    - email
    - name
    - password
    type: object
  dto.UserResponse:
    properties:
      date:
        description: ← "19/05/2026"
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      phone:
        type: string
      profile:
        $ref: '#/definitions/dto.ProfileSummary'
      profile_id:
        type: integer
      state:
        description: ← 1=activo, 0=inactivo
        type: integer
      time:
        description: ← "22:39:17"
        type: string
    type: object
  dto.UserUpdateRequest:
    properties:
      email:
        example: cesar@tudominio.com
        maxLength: 255
        type: string
      name:
        example: César Pérez
        maxLength: 255
        minLength: 2
        type: string
      password:
        example: '********'
        maxLength: 100
        minLength: 8
        type: string
      phone:
        example: "+56912345678"
        maxLength: 20
        type: string
      profile_id:
        example: 1
        type: integer
      state:
        description: ← *int
        enum:
        - 0
        - 1
        example: 1
        type: integer
    type: object
host: localhost:8082
info:
  contact: {}
  description: API Backend para GOLANG DEMO.
  title: Golang DEMO
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Autentica al usuario y crea una sesión con cookie HTTP-only
      parameters:
      - description: Credenciales
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Iniciar sesión
      tags:
      - Auth
  /auth/logout:
    post:
      description: Invalida la sesión actual y elimina la cookie
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LogoutResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Cerrar sesión
      tags:
      - Auth
  /auth/me:
    get:
      description: Retorna los datos del usuario actualmente autenticado
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MeResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Obtener usuario autenticado
      tags:
      - Auth
  /auth/refresh:
    post:
      description: Extiende el TTL de la sesión actual
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RefreshResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Renovar sesión
      tags:
      - Auth
  /health:
    get:
      description: Retorna "UP!!" si el servicio está activo
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.HealthResponse'
      summary: Verifica estado del servidor
      tags:
      - Health
  /items:
    get:
      description: Retorna todos los items registrados ordenados por ID descendente
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ItemResponse'
            type: array
      summary: Listar items
      tags:
      - Items
    post:
      consumes:
      - application/json
      description: Crea un nuevo item (acción) con nombre único
      parameters:
      - description: Datos del item
        in: body
        name: item
        required: true
        schema:
          $ref: '#/definitions/dto.ItemCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ItemResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Crear nuevo item
      tags:
      - Items
  /items/{id}:
    delete:
      description: Elimina un item por su ID (valida dependencias con profile_module_item)
      parameters:
      - description: ID del item
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Eliminar item
      tags:
      - Items
    get:
      description: Retorna un item específico por su ID
      parameters:
      - description: ID del item
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ItemResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Obtener item por ID
      tags:
      - Items
    put:
      consumes:
      - application/json
      description: Actualiza el nombre de un item existente
      parameters:
      - description: ID del item
        in: path
        name: id
        required: true
        type: integer
      - description: Nuevo nombre
        in: body
        name: item
        required: true
        schema:
          $ref: '#/definitions/dto.ItemUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ItemResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Actualizar item
      tags:
      - Items
  /modules:
    get:
      description: Retorna módulos paginados, con búsqueda por nombre y ordenamiento
      parameters:
      - default: 1
        description: Página
        in: query
        name: page
        type: integer
      - default: 20
        description: Registros por página
        in: query
        name: per_page
        type: integer
      - description: Término de búsqueda
        in: query
        name: search
        type: string
      - default: name
        description: Campo a buscar
        enum:
        - name
        in: query
        name: field
        type: string
      - description: Campo para ordenar
        enum:
        - id
        - name
        - slug
        - created_at
        in: query
        name: sort_by
        type: string
      - description: Dirección
        enum:
        - asc
        - desc
        in: query
        name: sort_dir
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.PaginatedResponse-dto_ModuleResponse'
      summary: Listar módulos con paginación y búsqueda
      tags:
      - Modules
    post:
      consumes:
      - application/json
      description: Crea un nuevo módulo con nombre y path (slug)
      parameters:
      - description: Datos del módulo
        in: body
        name: module
        required: true
        schema:
          $ref: '#/definitions/dto.ModuleCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ModuleResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Crear nuevo módulo
      tags:
      - Modules
  /modules/{id}:
    delete:
      description: Elimina un módulo por su ID (valida dependencias con profile_module)
      parameters:
      - description: ID del módulo
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Eliminar módulo
      tags:
      - Modules
    get:
      description: Retorna un módulo específico por su ID
      parameters:
      - description: ID del módulo
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ModuleResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Obtener módulo por ID
      tags:
      - Modules
    put:
      consumes:
      - application/json
      description: Actualiza nombre y path de un módulo existente
      parameters:
      - description: ID del módulo
        in: path
        name: id
        required: true
        type: integer
      - description: Nuevos datos
        in: body
        name: module
        required: true
        schema:
          $ref: '#/definitions/dto.ModuleUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ModuleResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Actualizar módulo
      tags:
      - Modules
  /profiles:
    get:
      description: Retorna perfiles paginados, con búsqueda por nombre y ordenamiento
      parameters:
      - default: 1
        description: Página
        in: query
        name: page
        type: integer
      - default: 20
        description: Registros por página
        in: query
        name: per_page
        type: integer
      - description: Término de búsqueda
        in: query
        name: search
        type: string
      - default: name
        description: Campo a buscar
        enum:
        - name
        in: query
        name: field
        type: string
      - description: Campo para ordenar
        enum:
        - id
        - name
        - created_at
        in: query
        name: sort_by
        type: string
      - description: Dirección
        enum:
        - asc
        - desc
        in: query
        name: sort_dir
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.PaginatedResponse-dto_ProfileResponse'
      summary: Listar perfiles con paginación y búsqueda
      tags:
      - Profiles
    post:
      consumes:
      - application/json
      description: Crea un nuevo perfil con nombre y descripción
      parameters:
      - description: Datos del perfil
        in: body
        name: profile
        required: true
        schema:
          $ref: '#/definitions/dto.ProfileCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ProfileResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Crear nuevo perfil
      tags:
      - Profiles
  /profiles/{id}:
    delete:
      description: Elimina un perfil por su ID (valida dependencias con profile_module)
      parameters:
      - description: ID del perfil
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Eliminar perfil
      tags:
      - Profiles
    get:
      description: Retorna un perfil específico por su ID
      parameters:
      - description: ID del perfil
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProfileResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Obtener perfil por ID
      tags:
      - Profiles
    put:
      consumes:
      - application/json
      description: Actualiza nombre y descripción de un perfil existente
      parameters:
      - description: ID del perfil
        in: path
        name: id
        required: true
        type: integer
      - description: Nuevos datos
        in: body
        name: profile
        required: true
        schema:
          $ref: '#/definitions/dto.ProfileUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProfileResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Actualizar perfil
      tags:
      - Profiles
  /profiles/{id}/modules:
    get:
      description: Retorna los módulos asignados a un perfil específico
      parameters:
      - description: ID del perfil
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Listar módulos asignados a un perfil
      tags:
      - Profile Modules
    put:
      consumes:
      - application/json
      description: Asigna o remueve módulos de un perfil (operación sync)
      parameters:
      - description: ID del perfil
        in: path
        name: id
        required: true
        type: integer
      - description: Array de IDs de módulos
        in: body
        name: modules
        required: true
        schema:
          $ref: '#/definitions/dto.ProfileModuleSyncRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Sincronizar módulos de un perfil
      tags:
      - Profile Modules
  /profiles/{id}/modules/{moduleId}/items:
    get:
      description: Retorna los items/permisos asignados a un módulo específico de
        un perfil
      parameters:
      - description: ID del perfil
        in: path
        name: id
        required: true
        type: integer
      - description: ID del módulo
        in: path
        name: moduleId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Listar items de un módulo de perfil
      tags:
      - Profile Module Items
    post:
      consumes:
      - application/json
      description: Asigna un item/permiso específico sin afectar los demás
      parameters:
      - description: ID del perfil
        in: path
        name: id
        required: true
        type: integer
      - description: ID del módulo
        in: path
        name: moduleId
        required: true
        type: integer
      - description: ID del item
        in: body
        name: item
        required: true
        schema:
          $ref: '#/definitions/dto.ProfileModuleItemAttachRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Agregar item individual a un módulo de perfil
      tags:
      - Profile Module Items
    put:
      consumes:
      - application/json
      description: Asigna o remueve items/permisos de un módulo específico (sync)
      parameters:
      - description: ID del perfil
        in: path
        name: id
        required: true
        type: integer
      - description: ID del módulo
        in: path
        name: moduleId
        required: true
        type: integer
      - description: Array de IDs de items
        in: body
        name: items
        required: true
        schema:
          $ref: '#/definitions/dto.ProfileModuleItemSyncRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Sincronizar items de un módulo de perfil
      tags:
      - Profile Module Items
  /profiles/{id}/modules/{moduleId}/items/{itemId}:
    delete:
      description: Remueve un item/permiso específico de un módulo de perfil
      parameters:
      - description: ID del perfil
        in: path
        name: id
        required: true
        type: integer
      - description: ID del módulo
        in: path
        name: moduleId
        required: true
        type: integer
      - description: ID del item
        in: path
        name: itemId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Eliminar item de un módulo de perfil
      tags:
      - Profile Module Items
  /states:
    get:
      description: Retorna todos los estados registrados ordenados por ID descendente
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.StateResponse'
            type: array
      summary: Listar estados
      tags:
      - States
  /users:
    get:
